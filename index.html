<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuclear Equity Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0c0f;--surface:#111418;--surface2:#181c22;--border:#1e242d;--border2:#252c38;
  --text:#e8edf5;--muted:#6b7a8d;--accent:#4f8ef7;--green:#3dd68c;--red:#f74f4f;--amber:#f7c94f;
  --font-mono:'IBM Plex Mono',monospace;--font-sans:'IBM Plex Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font-sans);font-size:13px;min-height:100vh;}

.header{padding:14px 22px 0;border-bottom:1px solid var(--border);display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.header h1{font-family:var(--font-mono);font-size:15px;font-weight:600;letter-spacing:-.02em;}
.header p{font-size:10px;color:var(--muted);margin-top:2px;font-family:var(--font-mono);}
.hdr-r{display:flex;align-items:center;gap:8px;padding-bottom:12px;}
.ts{font-family:var(--font-mono);font-size:10px;color:var(--muted);}
.btn{font-family:var(--font-mono);font-size:11px;padding:5px 12px;background:transparent;border:1px solid var(--border2);color:var(--accent);border-radius:4px;cursor:pointer;transition:all .12s;}
.btn:hover{background:rgba(79,142,247,.08);border-color:var(--accent);}
.btn:disabled{opacity:.4;cursor:not-allowed;}

.sbar{padding:6px 22px;font-family:var(--font-mono);font-size:11px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);}
.sdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.dok{background:var(--green);}
.dwarn{background:var(--amber);animation:bl 1s ease-in-out infinite;}
.derr{background:var(--red);}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.3}}

.ctrl{padding:9px 22px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;border-bottom:1px solid var(--border);}
.tabs{display:flex;gap:2px;}
.tab{font-family:var(--font-mono);font-size:11px;padding:4px 11px;border-radius:3px;cursor:pointer;color:var(--muted);background:transparent;border:none;transition:all .12s;}
.tab:hover{color:var(--text);}
.tab.active{background:var(--surface2);color:var(--accent);}
.sorts{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.slbl{font-size:10px;color:var(--muted);font-family:var(--font-mono);}
.sb{font-family:var(--font-mono);font-size:10px;padding:3px 7px;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:3px;cursor:pointer;transition:all .12s;}
.sb:hover{color:var(--text);}
.sb.active{color:var(--accent);border-color:var(--accent);background:rgba(79,142,247,.06);}

.prog{height:2px;background:var(--surface2);}
.pf{height:100%;background:var(--accent);transition:width .4s;width:0%;}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:1px;background:var(--border);}
.grid.wide{grid-template-columns:repeat(auto-fill,minmax(480px,1fr));}
.card{background:var(--bg);padding:15px 17px;transition:background .12s;}
.card:hover{background:var(--surface);}
.ch{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:11px;}
.tkr{font-family:var(--font-mono);font-size:15px;font-weight:600;}
.cn{font-size:11px;color:var(--muted);margin-top:2px;}
.pb{text-align:right;}
.prc{font-family:var(--font-mono);font-size:15px;font-weight:500;}
.chg{font-family:var(--font-mono);font-size:11px;margin-top:2px;}
.pos{color:var(--green);}
.neg{color:var(--red);}
.neu{color:var(--muted);}

.shd{font-family:var(--font-mono);font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:6px;padding-bottom:3px;border-bottom:1px solid var(--border);}
.ptbl{width:100%;border-collapse:collapse;margin-bottom:11px;}
.ptbl th{font-family:var(--font-mono);font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;padding:0 0 5px;text-align:right;}
.ptbl th:first-child{text-align:left;}
.ptbl td{font-family:var(--font-mono);font-size:12px;padding:4px 0;text-align:right;border-top:1px solid var(--border);}
.ptbl td:first-child{text-align:left;color:var(--muted);font-size:10px;}

.kg{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:8px;}
.kv{background:var(--surface);border-radius:4px;padding:6px 8px;}
.kl{font-size:9px;color:var(--muted);font-family:var(--font-mono);text-transform:uppercase;margin-bottom:2px;}
.kval{font-family:var(--font-mono);font-size:12px;font-weight:500;}
.na{color:var(--muted);font-style:italic;font-size:11px;}

.pill{font-family:var(--font-mono);font-size:10px;padding:2px 7px;border-radius:2px;display:inline-block;font-weight:500;}
.pbuy{background:rgba(61,214,140,.1);color:var(--green);}
.phold{background:rgba(247,201,79,.1);color:var(--amber);}
.psell{background:rgba(247,79,79,.1);color:var(--red);}
.pbeat{background:rgba(61,214,140,.08);color:var(--green);}
.pmiss{background:rgba(247,79,79,.08);color:var(--red);}
.pil{background:var(--surface2);color:var(--muted);}

.ptbw{margin-bottom:8px;}
.ptbt{height:4px;background:var(--surface2);border-radius:2px;position:relative;margin:6px 0 4px;}
.ptbf{height:100%;border-radius:2px;background:var(--accent);}
.ptbd{position:absolute;top:-4px;width:11px;height:11px;border-radius:50%;background:var(--accent);transform:translateX(-50%);border:2px solid var(--bg);}
.ptbls{display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:9px;color:var(--muted);}
.ptcr{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}

.dcfr{display:flex;align-items:center;gap:7px;margin-bottom:4px;}
.dcfl{font-family:var(--font-mono);font-size:10px;color:var(--muted);width:68px;flex-shrink:0;}
.dcft{flex:1;height:15px;background:var(--surface);border-radius:2px;overflow:hidden;}
.dcff{height:100%;display:flex;align-items:center;padding:0 6px;font-family:var(--font-mono);font-size:10px;font-weight:500;color:#fff;min-width:38px;}
.dcfu{font-family:var(--font-mono);font-size:10px;width:48px;text-align:right;flex-shrink:0;}

.covr{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);}
.covr:last-child{border-bottom:none;}
.covf{font-size:11px;}
.covright{display:flex;align-items:center;gap:6px;}
.covd{font-family:var(--font-mono);font-size:9px;color:var(--muted);}
.ni{padding:7px 0;border-bottom:1px solid var(--border);font-size:12px;color:var(--muted);line-height:1.6;}
.ni:first-child{padding-top:0;}
.ni:last-child{border-bottom:none;}

.sk{background:var(--surface2);border-radius:3px;animation:pu 1.5s ease-in-out infinite;}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.3}}
.sp{display:inline-block;width:10px;height:10px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:ro .7s linear infinite;vertical-align:middle;margin-right:5px;}
@keyframes ro{to{transform:rotate(360deg)}}

/* ── CHART STYLES ── */
.chart-wrap{margin-bottom:10px;}
.chart-btns{display:flex;gap:4px;margin-bottom:6px;}
.chart-btn{font-family:var(--font-mono);font-size:9px;padding:2px 7px;border:1px solid var(--border);background:transparent;color:var(--muted);border-radius:2px;cursor:pointer;transition:all .1s;}
.chart-btn:hover{color:var(--text);border-color:var(--border2);}
.chart-btn.active{color:var(--accent);border-color:var(--accent);background:rgba(79,142,247,.08);}
.chart-container{position:relative;width:100%;height:80px;cursor:crosshair;}
.cat-bar{padding:6px 22px;display:flex;align-items:center;gap:4px;flex-wrap:wrap;border-bottom:1px solid var(--border);background:var(--surface);}
.cat-btn{font-family:var(--font-mono);font-size:10px;padding:3px 10px;border:1px solid var(--border);background:transparent;color:var(--muted);border-radius:2px;cursor:pointer;transition:all .12s;}
.cat-btn:hover{color:var(--text);}
.cat-btn.active{color:#fff;border-color:transparent;}
.cat-hdr{grid-column:1/-1;padding:10px 4px 4px;font-family:var(--font-mono);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;border-bottom:2px solid;margin-bottom:0;}

.chart-svg{width:100%;height:80px;display:block;}
.chart-tooltip{position:absolute;top:0;left:0;pointer-events:none;display:none;z-index:10;}
.chart-tooltip-box{background:var(--surface2);border:1px solid var(--border2);border-radius:3px;padding:4px 8px;white-space:nowrap;}
.chart-tooltip-date{font-family:var(--font-mono);font-size:9px;color:var(--muted);}
.chart-tooltip-price{font-family:var(--font-mono);font-size:12px;font-weight:600;}
.chart-meta{display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:9px;color:var(--muted);margin-top:3px;}

/* ── PEER BASKET CHART ── */
.peer-panel{padding:18px 22px;border-bottom:1px solid var(--border);background:var(--surface);display:none;}
.peer-panel.show{display:block;}
.peer-chart-wrap{position:relative;width:100%;height:280px;cursor:crosshair;margin:10px 0;}
.peer-chart-svg{width:100%;height:100%;display:block;}
.peer-legend{display:flex;flex-wrap:wrap;gap:12px;margin-top:8px;font-family:var(--font-mono);font-size:10px;}
.peer-legend-item{display:flex;align-items:center;gap:5px;cursor:pointer;transition:opacity .15s;}
.peer-legend-item:hover{opacity:.8;}
.peer-legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0;}
.peer-range-btns{display:flex;gap:4px;margin-bottom:8px;}
.peer-range-btn{font-family:var(--font-mono);font-size:10px;padding:3px 10px;border:1px solid var(--border);background:transparent;color:var(--muted);border-radius:2px;cursor:pointer;transition:all .1s;}
.peer-range-btn:hover{color:var(--text);border-color:var(--border2);}
.peer-range-btn.active{color:var(--accent);border-color:var(--accent);background:rgba(79,142,247,.08);}
.peer-tooltip{position:absolute;top:0;left:0;pointer-events:none;display:none;z-index:10;}
.peer-tooltip-box{background:var(--surface2);border:1px solid var(--border2);border-radius:4px;padding:6px 10px;white-space:nowrap;min-width:140px;}
.peer-perf-tbl{width:100%;border-collapse:collapse;margin-top:12px;}
.peer-perf-tbl th{font-family:var(--font-mono);font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;padding:4px 8px 6px;text-align:right;border-bottom:1px solid var(--border);}
.peer-perf-tbl th:first-child{text-align:left;}
.peer-perf-tbl td{font-family:var(--font-mono);font-size:11px;padding:5px 8px;text-align:right;border-top:1px solid var(--border);}
.peer-perf-tbl td:first-child{text-align:left;color:var(--muted);font-size:10px;}

</style>
</head>

<div class="header">

const toYMD = d => d.toISOString().split('T')[0];
const daysAgo = n => toYMD(new Date(Date.now()-n*86400000));
const ytdStart = () => new Date().getFullYear()+'-01-02';
const oneYrAgo = () => { const d=new Date(); d.setFullYear(d.getFullYear()-1); return toYMD(d); };

async function fmpGet(path) {
  const url = `${BASE}${path}&apikey=${KEY}`;
  const r = await fetch(url, {signal:AbortSignal.timeout(15000)});
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  const j = await r.json();
  if (j && !Array.isArray(j) && j['Error Message']) throw new Error(j['Error Message']);
  return j;
}

async function fetchTicker(ticker) {
  /* ── STEP 1: Quote (price + metadata) ─────────────────────────
     URL: /stable/quote?symbol=TICKER&apikey=KEY
     Returns array. First element contains all fields we need.      */
  const qData = await fmpGet(`/quote?symbol=${ticker}`);
  const q = Array.isArray(qData) ? qData[0] : qData;
  if (!q || q.price == null) throw new Error('No price data');

  const price     = +q.price;
  const prevClose = +(q.previousClose ?? q.prevClose ?? price);
  const changePct = +(q.changesPercentage ?? q.changePercentage ??
                    ((price-prevClose)/prevClose*100) ?? 0);
  const mktCap    = q.marketCap ? fmtCap(+q.marketCap) : null;
  const pe        = q.pe ? +q.pe : null;
  const vol       = q.volume ? fmtVol(+q.volume) : null;

  /* ── STEP 2: Historical EOD prices ────────────────────────────
     FMP stable endpoint for historical prices:
     /stable/historical-price-eod/full?symbol=TICKER&from=DATE&to=DATE
     Note: path starts with ? so fmpGet appends &apikey correctly  */
  let wk1Pct=null, mo1Pct=null, ytdPct=null, yr1Pct=null;

  // Try multiple endpoint formats — FMP has changed paths over time
  // Fetch 5 years of data to support 3Y and 5Y chart ranges
  const endpoints = [
    `/historical-price-eod/full?symbol=${ticker}&from=${daysAgo(1830)}&to=${toYMD(new Date())}`,
    `/historical-price-eod?symbol=${ticker}&from=${daysAgo(1830)}&to=${toYMD(new Date())}`,
    `/historical-price-eod/light?symbol=${ticker}&from=${daysAgo(1830)}&to=${toYMD(new Date())}`,
  ];

  let bars = null;
  for (const ep of endpoints) {
    try {
      const hData = await fmpGet(ep);
      // Response can be {historical:[...]} or directly an array
      const candidate = hData?.historical || (Array.isArray(hData) ? hData : null);
      if (candidate && candidate.length > 5) {
        bars = candidate;
        break;
      }
    } catch(e) { /* try next */ }
  }

  if (bars && bars.length > 5) {
    const map = {};
    bars.forEach(b => {
      if (b.date) {
        // Use adjClose for accuracy, fall back to close
        const c = b.adjClose ?? b.adj_close ?? b.close ?? b.c;
        if (c != null) map[b.date] = +c;
      }
    });

    const dates = Object.keys(map).sort((a,b)=>b.localeCompare(a)); // newest first
    const closeBefore = target => {
      for (const d of dates) { if (d <= target) return map[d]; }
      return null;
    };
    const pct = old => (old && price) ? ((price-old)/old*100) : null;

    wk1Pct = pct(closeBefore(daysAgo(7)));
    mo1Pct  = pct(closeBefore(daysAgo(30)));
    ytdPct  = pct(closeBefore(ytdStart()));
    yr1Pct  = pct(closeBefore(oneYrAgo()));

    // Store full 5 years of price history for charting (oldest first for left-to-right)
    const chartData = dates
      .filter(d => d >= daysAgo(1830))
      .map(d => ({ d, v: map[d] }))
      .reverse();
  return {price, prevClose, changePct, wk1Pct, mo1Pct, ytdPct, yr1Pct, mktCap, pe, vol, chartData, priceMap: map, priceDates: dates,
    yr3Pct: pct(closeBefore(daysAgo(365*3))),
    yr5Pct: pct(closeBefore(daysAgo(1825)))
  };
  }

  return {price, prevClose, changePct, wk1Pct, mo1Pct, ytdPct, yr1Pct, mktCap, pe, vol};
}

async function fetchFinancials(ticker) {
  if (finCache[ticker]) return finCache[ticker];
  const result = {};
  const lv = live[ticker] || {};
  const price = lv.price || null;

  // ── 1. Key metrics TTM ─────────────────────────────────
  try {
    const d = await fmpGet(`/key-metrics-ttm?symbol=${ticker}`);
    const m = Array.isArray(d) ? d[0] : d;
    if (m) {
      result.peTTM        = m.peRatioTTM ?? null;
      result.evEbitda     = m.evToEbitdaTTM ?? m.enterpriseValueOverEBITDATTM ?? null;
      result.ps           = m.priceToSalesRatioTTM ?? m.psTTM ?? null;
      result.pb           = m.pbRatioTTM ?? m.priceToBookRatioTTM ?? null;

      result.fcfPerShare  = m.freeCashFlowPerShareTTM ?? null;
      result.roeTTM       = m.roeTTM ?? null;
      result.roaTTM       = m.returnOnTangibleAssetsTTM ?? null;
      result.debtEq       = m.debtToEquityTTM ?? null;
      result.currentRatio = m.currentRatioTTM ?? null;
      result.interestCov  = m.interestCoverageTTM ?? null;
      result.evFCF        = m.evToFreeCashFlowTTM ?? null;
      result.pfcf         = m.priceToFreeCashFlowsRatioTTM ?? null;
      result.enterpriseVal= m.enterpriseValueTTM ?? null;
    }
  } catch(e) {}

  // ── 2. Ratios TTM (extra multiples) ────────────────────
  try {
    const d = await fmpGet(`/ratios-ttm?symbol=${ticker}`);
    const m = Array.isArray(d) ? d[0] : d;
    if (m) {
      if (!result.peTTM)    result.peTTM     = m.peRatioTTM ?? null;
      if (!result.ps)       result.ps        = m.priceToSalesRatioTTM ?? null;
      if (!result.pb)       result.pb        = m.priceToBookRatioTTM ?? null;
      result.pegRatio       = m.pegRatioTTM ?? null;
      result.dividendYield  = m.dividendYieldTTM ?? null;
      result.payoutRatio    = m.payoutRatioTTM ?? null;
      result.operatingMargin= m.operatingProfitMarginTTM ?? null;
    }
  } catch(e) {}

  // ── 3. Income statement (annual, 3 years) ──────────────
  try {
    const d = await fmpGet(`/income-statement?symbol=${ticker}&period=annual&limit=3`);
    const rows = Array.isArray(d) ? d : [];
    if (rows.length > 0) {
      const r = rows[0];
      // Store full rows for GAAP display
      result.isRows = rows.slice(0, 3);
      result.revenue            = r.revenue ?? null;
      result.costOfRevenue      = r.costOfRevenue ?? null;
      result.grossProfit        = r.grossProfit ?? null;

      result.interestExpense    = r.interestExpense ?? null;
      result.interestIncome     = r.interestIncome ?? null;
      result.otherNonOpIncome   = r.totalOtherIncomeExpensesNet ?? null;
      result.pretaxIncome       = r.incomeBeforeTax ?? null;
      result.incomeTax          = r.incomeTaxExpense ?? null;
      result.netIncome          = r.netIncome ?? null;
      result.netMargin          = r.netIncomeRatio ?? null;
      result.ebitda             = r.ebitda ?? null;
      result.ebitdaMargin       = r.ebitdaMargin ?? (r.ebitda && r.revenue ? r.ebitda/r.revenue : null);
      result.depAmort           = r.depreciationAndAmortization ?? null;
      result.eps                = r.epsdiluted ?? r.eps ?? null;
      result.epsBasic           = r.eps ?? null;
      result.sharesBasic        = r.weightedAverageShsOut ?? null;
      result.sharesDiluted      = r.weightedAverageShsOutDil ?? null;
      result.reportDate         = r.date ?? null;
      result.reportPeriod       = r.period ?? null;
      result.totalExpenses      = r.totalExpenses ?? null;
      if (!result.peTTM && price && result.eps && result.eps > 0) {
        result.peTTM = price / result.eps;
      }
      if (rows.length > 1) {
        const prev = rows[1];
        if (prev.revenue && r.revenue) result.revGrowth = (r.revenue - prev.revenue) / Math.abs(prev.revenue);
        if (prev.ebitda && r.ebitda)   result.ebitdaGrowth = (r.ebitda - prev.ebitda) / Math.abs(prev.ebitda);
        if (prev.netIncome && r.netIncome) result.netIncomeGrowth = (r.netIncome - prev.netIncome) / Math.abs(prev.netIncome);

      result.totalLiab         = b.totalLiabilities ?? null;
      // Equity
      result.commonStock       = b.commonStock ?? null;
      result.retainedEarnings  = b.retainedEarnings ?? null;
      result.additionalPaidIn  = b.additionalPaidInCapital ?? null;
      result.totalEquity       = b.totalStockholdersEquity ?? null;
      result.totalLiabEquity   = b.totalLiabilitiesAndStockholdersEquity ?? null;
      // Derived
      result.totalLiquidity    = (result.cash||0) + (result.shortTermInv||0) || null;
      result.netDebt           = b.netDebt ?? (result.totalDebt != null && result.cash != null ? result.totalDebt - result.cash : null);
      result.debtEq            = result.totalDebt && result.totalEquity ? result.totalDebt / result.totalEquity : null;
      if (result.totalLiquidity && result.cashBurn && result.cashBurn > 0) {
        result.runwayYears = result.totalLiquidity / result.cashBurn;
      }
    }
  } catch(e) {}

  // ── 6. Quarterly income statement (4 quarters) ─────────
  try {
    const d = await fmpGet(`/income-statement?symbol=${ticker}&period=quarter&limit=4`);
    const rows = Array.isArray(d) ? d : [];
    result.isQRows = rows.slice(0, 4);
  } catch(e) {}

  // ── 7. Quarterly cash flow (4 quarters) ────────────────
  try {
    const d = await fmpGet(`/cash-flow-statement?symbol=${ticker}&period=quarter&limit=4`);
    const rows = Array.isArray(d) ? d : [];
    result.cfQRows = rows.slice(0, 4);
  } catch(e) {}

  // ── 8. Quarterly balance sheet (4 quarters) ────────────
  try {
    const d = await fmpGet(`/balance-sheet-statement?symbol=${ticker}&period=quarter&limit=4`);
    const rows = Array.isArray(d) ? d : [];
    result.bsQRows = rows.slice(0, 4);
  } catch(e) {}

  // ── 6. Analyst estimates — forward EPS, revenue, PE ───
  // Correct FMP stable endpoint: /stable/analyst-estimates?symbol=X&period=annual&page=0&limit=8
  try {
    const d = await fmpGet(`/analyst-estimates?symbol=${ticker}&period=annual&page=0&limit=8`);
    const rows = Array.isArray(d) ? d : [];
    const today = new Date().toISOString().split('T')[0];

    // Sort by date and get future estimates only
    const future = rows
      .filter(r => r.date && r.date > today)
      .sort((a,b) => a.date.localeCompare(b.date))
      .slice(0,2);

    // Also try quarterly if annual returns nothing
    let allRows = future;
    if (allRows.length === 0) {
      try {
        const d2 = await fmpGet(`/analyst-estimates?symbol=${ticker}&period=quarter&page=0&limit=8`);
        const qrows = Array.isArray(d2) ? d2 : [];
        allRows = qrows
          .filter(r => r.date && r.date > today)
          .sort((a,b) => a.date.localeCompare(b.date))
          .slice(0,2);
      } catch(e2) {}
    }

    if (allRows.length > 0) {
      const f1 = allRows[0];
      // FMP uses different field names across versions — try all known variants
      result.fwdRevEst    = f1.estimatedRevenueAvg    ?? f1.estimatedRevenue    ?? f1.revenueAvg    ?? null;
      result.fwdRevHigh   = f1.estimatedRevenueHigh   ?? f1.revenueHigh         ?? null;
      result.fwdRevLow    = f1.estimatedRevenueLow    ?? f1.revenueLow          ?? null;
      result.fwdEpsEst    = f1.estimatedEpsAverage    ?? f1.estimatedEps        ?? f1.epsAvg        ?? f1.epsDilutedAvg ?? null;
      result.fwdEpsHigh   = f1.estimatedEpsHigh       ?? f1.epsHigh             ?? null;
      result.fwdEpsLow    = f1.estimatedEpsLow        ?? f1.epsLow              ?? null;
      result.fwdEbitdaEst = f1.estimatedEbitdaAvg     ?? f1.estimatedEbitda     ?? f1.ebitdaAvg     ?? null;
      result.fwdNetIncEst = f1.estimatedNetIncomeAvg  ?? f1.estimatedNetIncome  ?? f1.netIncomeAvg  ?? null;
      result.fwdPeriod    = f1.date ?? null;

      // Forward P/E: price / forward EPS
      if (price && result.fwdEpsEst && result.fwdEpsEst > 0) {
        result.fwdPE = price / result.fwdEpsEst;
      }
      // Forward EV/EBITDA
      if (result.enterpriseVal && result.fwdEbitdaEst && result.fwdEbitdaEst > 0) {
        result.fwdEvEbitda = result.enterpriseVal / result.fwdEbitdaEst;
      }
      // Forward P/S — need market cap
      if (price && result.fwdRevEst && result.fwdRevEst > 0 && lv.mktCap) {
        const raw = lv.mktCap;
        const num = parseFloat(raw);
        const mult = raw.includes('T')?1e12:raw.includes('B')?1e9:raw.includes('M')?1e6:1;
        const mcap = num * mult;
        if (mcap > 0) result.fwdPS = mcap / result.fwdRevEst;
      }
    }
    if (allRows.length > 1) {
      const f2 = allRows[1];
      result.fwdRevEst2    = f2.estimatedRevenueAvg ?? f2.estimatedRevenue ?? f2.revenueAvg ?? null;
      result.fwdEpsEst2    = f2.estimatedEpsAverage ?? f2.estimatedEps     ?? f2.epsAvg     ?? f2.epsDilutedAvg ?? null;
      result.fwdEbitdaEst2 = f2.estimatedEbitdaAvg  ?? f2.estimatedEbitda  ?? f2.ebitdaAvg  ?? null;
      result.fwdPeriod2    = f2.date ?? null;
      if (price && result.fwdEpsEst2 && result.fwdEpsEst2 > 0) {
        result.fwdPE2 = price / result.fwdEpsEst2;
      }
    }
  } catch(e) {}

  finCache[ticker] = result;

  // ── Fallback: inject verified analyst consensus data if API returns nothing ──
  // These are confirmed figures from analyst research (week of March 26, 2026)
  const KNOWN_ESTIMATES = {
    BWXT: { fwdEpsEst:4.625, fwdEpsEst2:5.10, fwdRevEst:3.75e9, fwdRevEst2:4.05e9, fwdPeriod:'2026-12', fwdPeriod2:'2027-12', fwdEbitdaEst:680e6 },
    CCJ:  { fwdEpsEst:0.92,  fwdEpsEst2:1.89, fwdRevEst:2.95e9, fwdRevEst2:3.40e9, fwdPeriod:'2026-12', fwdPeriod2:'2027-12', fwdEbitdaEst:820e6 },
    LEU:  { fwdEpsEst:4.80,  fwdEpsEst2:5.30, fwdRevEst:320e6,  fwdRevEst2:340e6,  fwdPeriod:'2026-12', fwdPeriod2:'2027-12', fwdEbitdaEst:null  },
    OKLO: { fwdEpsEst:-0.70, fwdEpsEst2:-0.50,fwdRevEst:1.5e6,  fwdRevEst2:3.3e6,  fwdPeriod:'2026-12', fwdPeriod2:'2027-12', fwdEbitdaEst:null  },
    MIR:  { fwdEpsEst:0.535, fwdEpsEst2:0.72, fwdRevEst:1.02e9, fwdRevEst2:1.08e9, fwdPeriod:'2026-12', fwdPeriod2:'2027-12', fwdEbitdaEst:null  },
    GHM:  { fwdEpsEst:2.10,  fwdEpsEst2:2.65, fwdRevEst:235e6,  fwdRevEst2:265e6,  fwdPeriod:'2027-03', fwdPeriod2:'2028-03', fwdEbitdaEst:null  },
  };

  if (KNOWN_ESTIMATES[ticker]) {
    const kb = KNOWN_ESTIMATES[ticker];
    // Only fill in fields that are still null after API fetch
    for (const [k,v] of Object.entries(kb)) {
      if (result[k] == null) result[k] = v;
    }
    // Recalculate forward P/E with fallback data
    if (!result.fwdPE && price && result.fwdEpsEst && result.fwdEpsEst > 0) {
      result.fwdPE = price / result.fwdEpsEst;
    }
    if (!result.fwdPE2 && price && result.fwdEpsEst2 && result.fwdEpsEst2 > 0) {
      result.fwdPE2 = price / result.fwdEpsEst2;
    }
    if (!result.fwdPS && price && result.fwdRevEst && lv.mktCap) {
      const raw = lv.mktCap;
      const num = parseFloat(raw);
      const mult = raw.includes('T')?1e12:raw.includes('B')?1e9:raw.includes('M')?1e6:1;
      const mcap = num * mult;
      if (mcap > 0) result.fwdPS = mcap / result.fwdRevEst;
    }
  }

  return result;
}

function fmtCap(v){
  if(v>=1e12)return(v/1e12).toFixed(2)+'T';
  if(v>=1e9)return(v/1e9).toFixed(2)+'B';
  if(v>=1e6)return(v/1e6).toFixed(0)+'M';
  return v.toString();
}
function fmtVol(v){
  if(v>=1e6)return(v/1e6).toFixed(1)+'M';
  if(v>=1e3)return(v/1e3).toFixed(0)+'K';
  return v.toString();
}

async function loadAll(){
  const btn=document.getElementById('rbtn'), pf=document.getElementById('pf');
  btn.disabled=true; btn.innerHTML='<span class="sp"></span>Loading';
  pf.style.width='0%'; live={}; renderGrid();
  // Clear caches so everything refreshes
  Object.keys(finCache).forEach(k=>delete finCache[k]);
  Object.keys(analystCache).forEach(k=>delete analystCache[k]);
  setStatus('warn','Fetching live data…');

  let done=0, ok=0;
  await Promise.allSettled(TICKERS.map(async t=>{
    try{ live[t]=await fetchTicker(t); ok++; }
    catch(e){ live[t]={error:true,msg:e.message}; }
    done++;
    pf.style.width=Math.round((done/TICKERS.length)*100)+'%';
    renderGrid();
  }));

  pf.style.width='100%';
  setTimeout(()=>pf.style.width='0%',800);
  document.getElementById('ts').textContent='Updated '+new Date().toLocaleTimeString();
  btn.disabled=false; btn.textContent='↻ Refresh';

  const failed=TICKERS.filter(t=>live[t]?.error);
  if(ok===TICKERS.length){
    const hasReturns = TICKERS.some(t=>live[t]?.wk1Pct!=null);
    setStatus('ok', hasReturns
      ? 'All 15 tickers loaded with full returns · '+new Date().toLocaleDateString()
      : 'Prices loaded · Historical returns unavailable (check FMP plan includes historical data)');
  }
  else if(ok>0) setStatus('warn',`${ok}/15 loaded · Failed: ${failed.join(', ')}`);
  else setStatus('err','Failed: '+(live[TICKERS[0]]?.msg||'unknown'));
}

function setStatus(t,m){
  document.getElementById('sdot').className='sdot '+(t==='ok'?'dok':t==='warn'?'dwarn':'derr');
  document.getElementById('smsg').textContent=m;
}

function ps(v,d=1){
  if(v==null||isNaN(v))return'<span class="na">N/A</span>';
  const c=v>0.05?'pos':v<-0.05?'neg':'neu';
  return`<span class="${c}">${v>0?'+':''}${v.toFixed(d)}%</span>`;
}
function rPill(r){
  if(!r)return'';
  const c=r==='Buy'?'pbuy':r==='Hold'?'phold':'psell';
  return`<span class="pill ${c}">${r}</span>`;
}
function ePill(res,note){
  const c=res==='beat'?'pbeat':res==='miss'?'pmiss':'pil';
  const l=res==='beat'?'Beat':res==='miss'?'Miss':'In-line';
  return`<span class="pill ${c}">${l}</span>&nbsp;<span style="font-size:10px;color:var(--muted);font-family:var(--font-mono)">${note||''}</span>`;
}

/* ── CHART STATE & RENDERER ────────────────────────── */
const chartRange = {}; // stores selected range per ticker, default '1M'

function getChartPoints(ticker, range) {
  const lv = live[ticker];
  if (!lv || !lv.chartData || lv.chartData.length < 2) return null;

  const today = toYMD(new Date());
  let fromDate;
  if (range === '1W')  fromDate = daysAgo(7);
  else if (range === '1M')  fromDate = daysAgo(30);
  else if (range === 'YTD') fromDate = ytdStart();
  else if (range === '1Y')  fromDate = oneYrAgo();
  else if (range === '3Y')  fromDate = daysAgo(365*3);
  else if (range === '5Y')  fromDate = daysAgo(1830);
  else fromDate = daysAgo(30);

  const pts = lv.chartData.filter(p => p.d >= fromDate);
  // Always include current price as last point
  if (pts.length < 2) return null;

  // Add today's live price as final point
  const withToday = [...pts];
  if (lv.price) {
    withToday.push({ d: today, v: lv.price });
  }
  return withToday;
}

function drawChart(ticker, range) {
  const pts = getChartPoints(ticker, range);
  if (!pts || pts.length < 2) {
    return `<div class="chart-container" style="display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:10px;color:var(--muted)">No chart data</div>`;
  }

  const vals = pts.map(p => p.v);
  const minV = Math.min(...vals);
  const maxV = Math.max(...vals);
  const range_v = maxV - minV || 1;
  const W = 276, H = 80, PAD = 4;

  const xFn = (i) => PAD + (i / (pts.length - 1)) * (W - PAD * 2);
  const yFn = (v) => H - PAD - ((v - minV) / range_v) * (H - PAD * 2);

  const polyPts = pts.map((p, i) => `${xFn(i).toFixed(1)},${yFn(p.v).toFixed(1)}`).join(' ');
  const linePath = pts.map((p, i) => `${i===0?'M':'L'}${xFn(i).toFixed(1)},${yFn(p.v).toFixed(1)}`).join(' ');
  const areaPath = `${linePath} L${xFn(pts.length-1).toFixed(1)},${H} L${PAD},${H} Z`;

  const isUp = pts[pts.length-1].v >= pts[0].v;
  const lineColor = isUp ? 'var(--green)' : 'var(--red)';
  const lineColorHex = isUp ? '#3dd68c' : '#f74f4f';
  const areaColorStart = isUp ? 'rgba(61,214,140,0.18)' : 'rgba(247,79,79,0.15)';
  const areaColorEnd   = isUp ? 'rgba(61,214,140,0.01)' : 'rgba(247,79,79,0.01)';

  const lastX = xFn(pts.length - 1);
  const lastY = yFn(pts[pts.length - 1].v);
  const gradId = `g_${ticker}_${range}`;

  // Store pts for hover access
  window[`chartPts_${ticker}_${range}`] = pts;

  const containerId = `chartc_${ticker}`;
  const ttId = `charttt_${ticker}`;
  const crossId = `chartcr_${ticker}`;
  const dotId = `chartdot_${ticker}`;

  return `
  <div class="chart-container" id="${containerId}"
    onmousemove="chartHover(event,'${ticker}','${range}',${W},${H},${PAD})"
    onmouseleave="chartLeave('${ticker}')">
    <svg class="chart-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="${gradId}" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="${areaColorStart}"/>
          <stop offset="100%" stop-color="${areaColorEnd}"/>
        </linearGradient>
      </defs>
      <line x1="${PAD}" y1="${H/2}" x2="${W-PAD}" y2="${H/2}" stroke="var(--border)" stroke-width="1" stroke-dasharray="3,3"/>
      <path d="${areaPath}" fill="url(#${gradId})"/>
      <polyline points="${polyPts}" fill="none" stroke="${lineColor}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
      <line id="${crossId}" x1="0" y1="0" x2="0" y2="${H}" stroke="var(--muted)" stroke-width="1" stroke-dasharray="3,3" opacity="0"/>
      <circle id="${dotId}" cx="${lastX.toFixed(1)}" cy="${lastY.toFixed(1)}" r="3.5" fill="${lineColorHex}" opacity="1"/>
      <line x1="${PAD}" y1="${yFn(pts[0].v).toFixed(1)}" x2="${W-PAD}" y2="${yFn(pts[0].v).toFixed(1)}" stroke="var(--border2)" stroke-width="1" stroke-dasharray="4,3"/>
    </svg>
    <div class="chart-tooltip" id="${ttId}">
      <div class="chart-tooltip-box">
        <div class="chart-tooltip-date" id="${ttId}_date"></div>
        <div class="chart-tooltip-price" id="${ttId}_price" style="color:${lineColorHex}"></div>
      </div>
    </div>
  </div>
  <div class="chart-meta">
    <span>$${minV.toFixed(2)} low</span>
    <span style="color:${lineColor}" id="chartcur_${ticker}">$${pts[pts.length-1].v.toFixed(2)}</span>
    <span>$${maxV.toFixed(2)} high</span>
  </div>`;
}

function chartHover(e, ticker, range, W, H, PAD) {
  const pts = window[`chartPts_${ticker}_${range}`];
  if (!pts || pts.length < 2) return;

  const container = document.getElementById(`chartc_${ticker}`);
  const rect = container.getBoundingClientRect();
  const mouseX = ((e.clientX - rect.left) / rect.width) * W;
  const clampedX = Math.max(PAD, Math.min(W - PAD, mouseX));

  const idx = Math.round(((clampedX - PAD) / (W - PAD * 2)) * (pts.length - 1));
  const safeIdx = Math.max(0, Math.min(pts.length - 1, idx));
  const pt = pts[safeIdx];

  const vals = pts.map(p => p.v);
  const minV = Math.min(...vals);
  const maxV = Math.max(...vals);
  const range_v = maxV - minV || 1;

  const xPos = PAD + (safeIdx / (pts.length - 1)) * (W - PAD * 2);
  const yPos = H - PAD - ((pt.v - minV) / range_v) * (H - PAD * 2);

  const cross = document.getElementById(`chartcr_${ticker}`);
  if (cross) { cross.setAttribute('x1', xPos); cross.setAttribute('x2', xPos); cross.setAttribute('opacity', '0.5'); }

  const dot = document.getElementById(`chartdot_${ticker}`);
  if (dot) { dot.setAttribute('cx', xPos); dot.setAttribute('cy', yPos); }

  const dateStr = pt.d ? new Date(pt.d + 'T12:00:00').toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'}) : '';

  const tt = document.getElementById(`charttt_${ticker}`);
  const ttDate = document.getElementById(`charttt_${ticker}_date`);
  const ttPrice = document.getElementById(`charttt_${ticker}_price`);

  if (tt && ttDate && ttPrice) {
    ttDate.textContent = dateStr;
    ttPrice.textContent = '$' + pt.v.toFixed(2);
    tt.style.display = 'block';
    const pxX = (xPos / W) * rect.width;
    const ttW = 110;
    tt.style.left = (pxX + ttW + 10 > rect.width ? pxX - ttW - 4 : pxX + 8) + 'px';
    tt.style.top = '4px';
  }

  const cur = document.getElementById(`chartcur_${ticker}`);
  if (cur) cur.textContent = '$' + pt.v.toFixed(2) + '  ' + dateStr;
}

function chartLeave(ticker) {
  const tt = document.getElementById(`charttt_${ticker}`);
  if (tt) tt.style.display = 'none';
  const cross = document.getElementById(`chartcr_${ticker}`);
  if (cross) cross.setAttribute('opacity', '0');
  const lv = live[ticker];
  if (lv && lv.price) {
    const cur = document.getElementById(`chartcur_${ticker}`);
    if (cur) cur.textContent = '$' + lv.price.toFixed(2);
  }
}

function rChart(ticker) {
  const range = chartRange[ticker] || '1M';
  const lv = live[ticker];
  if (!lv || lv.error) return '';
  const ranges = ['1W','1M','YTD','1Y','3Y','5Y'];
  const btns = ranges.map(r =>
    `<button class="chart-btn ${r===range?'active':''}" onclick="setChartRange('${ticker}','${r}',this)">${r}</button>`
  ).join('');
  return `<div class="chart-wrap">
    <div class="shd">Price chart</div>
    <div class="chart-btns">${btns}</div>
    <div id="chart_${ticker}">${drawChart(ticker, range)}</div>
  </div>`;
}

function setChartRange(ticker, range, btn) {
  chartRange[ticker] = range;
  const wrap = btn.closest('.chart-wrap');
  wrap.querySelectorAll('.chart-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(`chart_${ticker}`).innerHTML = drawChart(ticker, range);
}

function rValuation(t){
  const lv=live[t]||{},en=EN[t],p=lv.price;
  const fin=finCache[t]||{};
  const isETF=['URA','NLR','NUKZ'].includes(t);

  // Live recalculate forward PEs
  const liveMktCap = (() => {
    if (!lv.mktCap || !p) return null;
    const raw=lv.mktCap, num=parseFloat(raw);
    const mult=raw.includes('T')?1e12:raw.includes('B')?1e9:raw.includes('M')?1e6:1;
    return num*mult;
  })();
  const liveFwdPE  = (p && fin.fwdEpsEst  && fin.fwdEpsEst  > 0) ? p/fin.fwdEpsEst  : null;
  const liveFwdPE2 = (p && fin.fwdEpsEst2 && fin.fwdEpsEst2 > 0) ? p/fin.fwdEpsEst2 : null;
  const trailingPE = (p && fin.eps && fin.eps > 0) ? p/fin.eps : (fin.peTTM ?? lv.pe ?? null);

  const allV=[en.dcf_bear,en.dcf_base,en.dcf_bull,p].filter(v=>v!=null);
  const maxV=allV.length?Math.max(...allV)*1.08:200;
  function dRow(lbl,val,col){
    if(val==null)return`<div class="dcfr"><span class="dcfl">${lbl}</span><div class="dcft"><span style="font-size:10px;padding:2px 6px;color:var(--muted)">N/A</span></div><span class="dcfu"></span></div>`;
    const w=Math.min(97,(val/maxV)*100).toFixed(0);
    const u=p?((val-p)/p*100):null;
    return`<div class="dcfr"><span class="dcfl">${lbl}</span><div class="dcft"><div class="dcff" style="width:${w}%;background:${col}">$${Number(val).toFixed(0)}</div></div><span class="dcfu">${u!=null?`<span class="${u>=0?'pos':'neg'}">${u>=0?'+':''}${u.toFixed(0)}%</span>`:''}</span></div>`;
  }
  const pw=p?Math.min(97,(p/maxV)*100).toFixed(0):50;

  // Build P/E table rows — only show rows with data
  const peRows = [
    {label:'P/E trailing (TTM)', val:trailingPE},
    {label:`P/E fwd (${fin.fwdPeriod?fin.fwdPeriod.slice(0,7):'NTM'})`, val:liveFwdPE},
    {label:`P/E fwd (${fin.fwdPeriod2?fin.fwdPeriod2.slice(0,7):'FY+2'})`, val:liveFwdPE2},
    {label:'EV / EBITDA', val:fin.evEbitda},
    {label:'Price / Sales', val:fin.ps ?? (liveMktCap && fin.revenue && fin.revenue>0 ? liveMktCap/fin.revenue : null)},
    {label:'Price / Book', val:fin.pb},
    {label:'PEG ratio', val:fin.pegRatio},
  ].filter(r => r.val != null && isFinite(r.val));

  return`
    ${rChart(t)}
    <div class="shd">Valuation · live</div>
    <div class="kg">
      <div class="kv"><div class="kl">Market cap</div><div class="kval">${lv.mktCap||'<span class="na">N/A</span>'}</div></div>
      <div class="kv"><div class="kl">P/E (trailing)</div><div class="kval">${peFmt(trailingPE)}</div></div>
    </div>
    <div class="kg">
      <div class="kv"><div class="kl">Prev close</div><div class="kval">${lv.prevClose?'$'+lv.prevClose.toFixed(2):'<span class="na">N/A</span>'}</div></div>
      <div class="kv"><div class="kl">Volume</div><div class="kval">${lv.vol||'<span class="na">N/A</span>'}</div></div>
    </div>

    ${peRows.length > 0 && !isETF ? `
    <div class="shd">P/E & multiples summary · live price</div>
    <table class="ptbl">
      <thead><tr><th>Multiple</th><th style="text-align:right">Value</th></tr></thead>
      <tbody>
        ${peRows.map(r=>`<tr><td>${r.label}</td><td>${r.val<0?'<span class="neg">Neg</span>':r.val>1000?'<span class="na">N/M</span>':r.val.toFixed(1)+'x'}</td></tr>`).join('')}
      </tbody>
    </table>` : ''}

    ${!isETF ? `
    <div class="shd">DCF scenarios · WACC ${en.wacc}% · TGR ${en.tgr}%</div>
    <div class="dcfr"><span class="dcfl">Current</span><div class="dcft"><div class="dcff" style="width:${pw}%;background:#3a4455">${p?'$'+p.toFixed(2):'—'}</div></div><span class="dcfu"></span></div>
    ${dRow('Bear case',en.dcf_bear,'#7b1f1f')}
    ${dRow('Base case',en.dcf_base,'#1a3a6b')}
    ${dRow('Bull case',en.dcf_bull,'#1a4a32')}` : `
    <div class="shd">ETF info</div>
    <div style="font-size:11px;color:var(--muted);font-family:var(--font-mono);line-height:1.7">${en.en_note}</div>`}`;
}

const analystCache = {};

async function fetchAnalystCoverage(ticker) {
  if (analystCache[ticker]) return analystCache[ticker];
  const result = { consensus: null, ptHigh: null, ptLow: null, ptMedian: null, analystCount: null, grades: [] };

  // 1. Price target consensus
  try {
    const d = await fmpGet(`/price-target-consensus?symbol=${ticker}`);
    const r = Array.isArray(d) ? d[0] : d;
    if (r) {
      result.consensus   = r.targetConsensus ?? r.priceTargetAverage ?? null;
      result.ptHigh      = r.targetHigh      ?? r.priceTargetHigh    ?? null;
      result.ptLow       = r.targetLow       ?? r.priceTargetLow     ?? null;
      result.ptMedian    = r.targetMedian    ?? null;
    }
  } catch(e) {}

  // 2. Individual analyst price targets (most recent 12)
  try {
    const d = await fmpGet(`/price-target?symbol=${ticker}&limit=12`);
    const rows = Array.isArray(d) ? d : [];
    if (rows.length > 0) {
      // Deduplicate: keep most recent per analyst firm
      const seen = new Set();
      result.grades = rows
        .filter(r => {
          const key = (r.analystCompany || r.analyst || '').toLowerCase().trim();
          if (seen.has(key)) return false;
          seen.add(key);
          return true;
        })
        .slice(0, 8)
        .map(r => ({
          firm:   r.analystCompany || r.analyst || 'Unknown',
          rating: r.priceTargetRating ?? null,
          target: r.priceTarget ?? null,
          date:   r.publishedDate ? r.publishedDate.slice(0, 7) : null,
          url:    null
        }));
      // Derive analyst count
      if (!result.analystCount) result.analystCount = rows.length;
    }
  } catch(e) {}

  // 3. Grades summary for consensus rating + count
  try {
    const d = await fmpGet(`/grades-summary?symbol=${ticker}`);
    const r = Array.isArray(d) ? d[0] : d;
    if (r) {
      const total = (r.strongBuy||0)+(r.buy||0)+(r.hold||0)+(r.sell||0)+(r.strongSell||0);
      if (total > 0) result.analystCount = total;
      // Derive consensus label
      const buys = (r.strongBuy||0)+(r.buy||0);
      const sells = (r.sell||0)+(r.strongSell||0);
      const holds = r.hold||0;
      if (buys >= sells+holds*0.6) result.consensusRating = 'Buy';
      else if (sells > buys) result.consensusRating = 'Sell';
      else result.consensusRating = 'Hold';
    }
  } catch(e) {}

  analystCache[ticker] = result;
  return result;
}

  const ptLow       = ac?.ptLow        ?? en.pt_low;
  const analystCount= ac?.analystCount ?? en.analyst_count;
  const rating      = ac?.consensusRating ?? en.rating;

  }

  const up = consensus&&p ? ((consensus-p)/p*100) : null;
  const tp = (ptLow!=null&&ptHigh!=null&&p&&ptHigh!==ptLow)
    ? Math.min(96,Math.max(4,((p-ptLow)/(ptHigh-ptLow))*100)) : 50;

    ${grades.map(c=>{
      const tgt = c.target ?? c.pt_consensus;
      const u = p&&tgt ? ((tgt-p)/p*100) : null;
      // Normalize rating label
      const rawRating = c.rating ?? c.priceTargetRating ?? '';
      const normRating = rawRating.toLowerCase().includes('buy')||rawRating==='Overweight'?'Buy'
        : rawRating.toLowerCase().includes('sell')||rawRating==='Underweight'?'Sell'
        : rawRating?'Hold':'';
      const dateStr = c.date ? c.date.slice(0,7).replace('-',' ') : '';
      return`<div class="covr">
        <span class="covf">${c.url
          ?`<a href="${c.url}" target="_blank" style="color:var(--text);text-decoration:none;" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--text)'">${c.firm} ↗</a>`
          :c.firm}</span>
        <div class="covright">
          ${normRating?rPill(normRating):''}
          ${tgt!=null?`<span style="font-family:var(--font-mono);font-size:11px;font-weight:500;color:${u==null?'var(--text)':u>=0?'var(--green)':'var(--red)'}">$${Number(tgt).toFixed(0)}</span>`:''}
          ${u!=null?`<span style="font-family:var(--font-mono);font-size:10px;color:${u>=0?'var(--green)':'var(--red)'}">${u>=0?'+':''}${u.toFixed(0)}%</span>`:''}
          <span class="covd">${dateStr}</span>
        </div>
      </div>`;
    }).join('')}
    <div style="margin-top:10px"><div class="shd">Earnings</div>${ePill(en.er,en.en_note)}</div>`;
}

function fmtM(v){
  if(v==null)return'<span class="na">N/A</span>';
  const abs=Math.abs(v),neg=v<0;
  const s=abs>=1e12?(abs/1e12).toFixed(2)+'T':abs>=1e9?(abs/1e9).toFixed(2)+'B':abs>=1e6?(abs/1e6).toFixed(1)+'M':(abs/1e3).toFixed(0)+'K';
  return(neg?'<span class="neg">-$':'$')+s+(neg?'</span>':'');
}
function fmtX(v,d=1){return v==null||isNaN(v)||!isFinite(v)?'<span class="na">N/A</span>':Number(v).toFixed(d)+'x';}
function fmtPct(v,d=1){return v==null||isNaN(v)?'<span class="na">N/A</span>':(v*100).toFixed(d)+'%';}
function fmtEps(v){return v==null?'<span class="na">N/A</span>':'$'+Number(v).toFixed(2);}
function kv(label,val){return`<div class="kv"><div class="kl">${label}</div><div class="kval">${val}</div></div>`;}
function peFmt(v){return v&&v>0&&v<2000?v.toFixed(1)+'x':'<span class="na">N/A</span>';}
function gFmt(v){
  if(v==null||isNaN(v))return'<span class="na">N/A</span>';
  const c=v>=0?'pos':'neg';
  return`<span class="${c}">${v>=0?'+':''}${(v*100).toFixed(1)}%</span>`;
}

/* ── PEER BASKET CHART ────────────────────────────────── */
let peerRange = 'YTD';
let peerHidden = {}; // hidden basket keys

function getPeerFromDate(range) {
  if (range === '1M')  return daysAgo(30);
  if (range === 'YTD') return ytdStart();
  if (range === '1Y')  return oneYrAgo();
  return ytdStart();
}

function computeBasketIndex(catKey, fromDate) {
  const cat = CATS[catKey];
  if (!cat) return [];
  const tickers = cat.tickers;

  // Collect all dates that have price data for at least some tickers
  const tickerData = {};
  let allDates = new Set();
  tickers.forEach(t => {
    const lv = live[t];
    if (!lv || lv.error || !lv.priceMap) return;
    tickerData[t] = lv.priceMap;
    Object.keys(lv.priceMap).forEach(d => { if (d >= fromDate) allDates.add(d); });
  });

  const validTickers = Object.keys(tickerData);
  if (validTickers.length === 0) return [];

  const dates = [...allDates].sort();
  if (dates.length < 2) return [];

  // Get EV weights: use live mktCap + debt - cash from finCache, or just mktCap
  const weights = {};
  let totalWeight = 0;
  validTickers.forEach(t => {
    const lv2 = live[t];
    let ev = 0;
    if (lv2.mktCap) {
      const raw = lv2.mktCap;
      const num = parseFloat(raw);
      const mult = raw.includes('T') ? 1e12 : raw.includes('B') ? 1e9 : raw.includes('M') ? 1e6 : 1;
      ev = num * mult;
      // Add debt - cash if available
      const fin = finCache[t];
      if (fin) {
        ev += (fin.totalDebt || 0) - (fin.cash || 0);
      }
    }
    if (ev <= 0) ev = 1e8; // fallback
    weights[t] = ev;
    totalWeight += ev;
  });

  // Normalize weights
  validTickers.forEach(t => { weights[t] /= totalWeight; });

  // Find base prices (first available date for each ticker)
  const basePrices = {};
  validTickers.forEach(t => {
    const map = tickerData[t];
    // Find closest date on or after fromDate
    for (const d of dates) {
      if (map[d] != null) { basePrices[t] = map[d]; break; }
    }
  });

  // Compute weighted indexed value for each date
  const result = [];
  dates.forEach(d => {
    let indexVal = 0;
    let weightUsed = 0;
    validTickers.forEach(t => {
      const map = tickerData[t];
      const base = basePrices[t];
      if (!base) return;
      // Find closest price on or before d
      let price = null;
      const sortedDates = Object.keys(map).sort();
      for (let i = sortedDates.length - 1; i >= 0; i--) {
        if (sortedDates[i] <= d) { price = map[sortedDates[i]]; break; }
      }
      if (price != null) {
        indexVal += (price / base) * 100 * weights[t];
        weightUsed += weights[t];
      }
    });
    if (weightUsed > 0) {
      result.push({ d, v: indexVal / weightUsed });
    }
  });

  // Add today's live prices
  const today = toYMD(new Date());
  let todayIdx = 0, todayW = 0;
  validTickers.forEach(t => {
    const lv2 = live[t];
    const base = basePrices[t];
    if (!base || !lv2 || !lv2.price) return;
    todayIdx += (lv2.price / base) * 100 * weights[t];
    todayW += weights[t];
  });
  if (todayW > 0) {
    result.push({ d: today, v: todayIdx / todayW });
  }

  return result;
}

function getBasketReturn(catKey, fromDate) {
  const pts = computeBasketIndex(catKey, fromDate);
  if (pts.length < 2) return null;
  return pts[pts.length - 1].v - 100;
}

function drawPeerChart() {
  const ranges = ['1M', 'YTD', '1Y'];
  const baskets = Object.keys(CATS);
  const colors = { industrials: '#4f8ef7', smr: '#3dd68c', fuel: '#f7c94f', etf: '#a78bfa' };

  ranges.forEach(range => {
    const fromDate = getPeerFromDate(range);
    const basketData = {};
    let allVals = [];

    baskets.forEach(key => {
      if (peerHidden[key]) return;
      const pts = computeBasketIndex(key, fromDate);
      basketData[key] = pts;
      pts.forEach(p => allVals.push(p.v));
    });

    const container = document.getElementById(`peerChart_${range}`);
    if (!container) return;

    if (allVals.length === 0) {
      container.innerHTML = '<div style="height:180px;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:10px;color:var(--muted)">Loading…</div>';
      return;
    }

    const W = 320, H = 200, PAD = 42, PADR = 52, PADT = 12, PADB = 24;
    const minV = Math.min(...allVals, 100) - 2;
    const maxV = Math.max(...allVals, 100) + 2;
    const rangeV = maxV - minV || 1;

    let allDates = new Set();
    baskets.forEach(key => {
      if (basketData[key]) basketData[key].forEach(p => allDates.add(p.d));
    });
    const dates = [...allDates].sort();
    if (dates.length < 2) { container.innerHTML = '<div style="height:200px;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:10px;color:var(--muted)">Insufficient data</div>'; return; }

    const xFn = (d) => PAD + ((dates.indexOf(d)) / (dates.length - 1)) * (W - PAD - PADR);
    const yFn = (v) => PADT + ((maxV - v) / rangeV) * (H - PADT - PADB);

    // Grid lines — aim for 5-7 ticks regardless of range
    const gridLines = [];
    const yTicks = [];
    const rawStep = rangeV / 6;
    const mag = Math.pow(10, Math.floor(Math.log10(rawStep)));
    const nice = [1, 2, 5, 10, 20, 25, 50, 100, 200, 500];
    const step = nice.find(n => n * mag >= rawStep) * mag || rawStep;
    for (let v = Math.ceil(minV / step) * step; v <= maxV; v += step) {
      const y = yFn(v);
      gridLines.push(`<line x1="${PAD}" y1="${y.toFixed(1)}" x2="${W - PADR}" y2="${y.toFixed(1)}" stroke="var(--border)" stroke-width="0.5"/>`);
      yTicks.push(`<text x="${PAD - 5}" y="${(y + 3).toFixed(1)}" fill="var(--muted)" font-size="8" font-family="var(--font-mono)" text-anchor="end">${v.toFixed(0)}</text>`);
    }
    // 100 baseline
    const y100 = yFn(100);
    gridLines.push(`<line x1="${PAD}" y1="${y100.toFixed(1)}" x2="${W - PADR}" y2="${y100.toFixed(1)}" stroke="var(--muted)" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>`);

    // Date labels
    const dateLabels = [];
    const labelCount = Math.min(4, dates.length);
    for (let i = 0; i < labelCount; i++) {
      const idx = Math.round(i * (dates.length - 1) / (labelCount - 1));
      const d = dates[idx];
      const x = xFn(d);
      const label = new Date(d + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      dateLabels.push(`<text x="${x.toFixed(1)}" y="${H - 4}" fill="var(--muted)" font-size="8" font-family="var(--font-mono)" text-anchor="middle">${label}</text>`);
    }

    // Lines
    const lines = [];
    const rawEndLabels = [];
    baskets.forEach(key => {
      if (peerHidden[key] || !basketData[key] || basketData[key].length < 2) return;
      const pts = basketData[key];
      const color = colors[key];
      const pathD = pts.map((p, i) => {
        const x = xFn(p.d);
        const y = yFn(p.v);
        return `${i === 0 ? 'M' : 'L'}${x.toFixed(1)},${y.toFixed(1)}`;
      }).join(' ');
      lines.push(`<path d="${pathD}" fill="none" stroke="${color}" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>`);

      const last = pts[pts.length - 1];
      const lx = xFn(last.d);
      const ly = yFn(last.v);
      const ret = (last.v - 100).toFixed(1);
      const sign = last.v >= 100 ? '+' : '';
      lines.push(`<circle cx="${lx.toFixed(1)}" cy="${ly.toFixed(1)}" r="3" fill="${color}"/>`);
      rawEndLabels.push({ x: lx, y: ly, color, text: `${sign}${ret}%` });
    });

    // De-overlap end labels (push apart if within 10px vertically)
    rawEndLabels.sort((a, b) => a.y - b.y);
    for (let i = 1; i < rawEndLabels.length; i++) {
      const gap = rawEndLabels[i].y - rawEndLabels[i - 1].y;
      if (gap < 11) {
        const shift = (11 - gap) / 2;
        rawEndLabels[i - 1].y -= shift;
        rawEndLabels[i].y += shift;
      }
    }
    const endLabels = rawEndLabels.map(l =>
      `<text x="${(l.x + 6).toFixed(1)}" y="${(l.y + 3).toFixed(1)}" fill="${l.color}" font-size="9" font-family="var(--font-mono)" font-weight="600">${l.text}</text>`
    );

    // Crosshair
    const crossId = `peerCross_${range}`;
    const ttId = `peerTT_${range}`;

    container.innerHTML = `<div style="position:relative;cursor:crosshair;" id="peerWrap_${range}"
      onmousemove="peerMiniHover(event,'${range}')" onmouseleave="peerMiniLeave('${range}')">
      <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block;" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
        ${gridLines.join('')}
        ${yTicks.join('')}
        ${dateLabels.join('')}
        ${lines.join('')}
        ${endLabels.join('')}
        <line id="${crossId}" x1="0" y1="${PADT}" x2="0" y2="${H - PADB}" stroke="var(--muted)" stroke-width="1" stroke-dasharray="3,3" opacity="0"/>
      </svg>
      <div class="peer-tooltip" id="${ttId}">
        <div class="peer-tooltip-box" id="${ttId}_box"></div>
      </div>
    </div>`;

    // Store meta for hover
    window[`_peerMini_${range}`] = { dates, W, H, PAD, PADR, PADT, PADB, baskets: baskets.filter(k => !peerHidden[k]), basketData, colors, minV, maxV, rangeV };
  });

  // Shared legend with ticker listings
  const legend = baskets.map(key => {
    const cat = CATS[key];
    const hidden = peerHidden[key];
    const tickers = cat.tickers.join(', ');
    return `<div class="peer-legend-item" onclick="togglePeerBasket('${key}')" style="opacity:${hidden ? 0.3 : 1};flex-direction:column;align-items:flex-start;gap:1px">
      <div style="display:flex;align-items:center;gap:5px">
        <div class="peer-legend-dot" style="background:${colors[key]}"></div>
        <span style="color:${hidden ? 'var(--muted)' : 'var(--text)'}">${cat.label}</span>
      </div>
      <span style="font-size:9px;color:var(--muted);margin-left:15px">${tickers}</span>
    </div>`;
  }).join('');
  document.getElementById('peerLegendArea').innerHTML = `<div class="peer-legend">${legend}</div>`;

  // Performance table
  const tRanges = [
    { label: '1M', from: daysAgo(30) },
    { label: 'YTD', from: ytdStart() },
    { label: '1Y', from: oneYrAgo() },
  ];
  let perfRows = baskets.map(key => {
    const cat = CATS[key];
    const cells = tRanges.map(r => {
      const ret = getBasketReturn(key, r.from);
      if (ret == null) return '<td><span class="na">N/A</span></td>';
      const c = ret >= 0 ? 'pos' : 'neg';
      const s = ret >= 0 ? '+' : '';
      return `<td><span class="${c}">${s}${ret.toFixed(1)}%</span></td>`;
    }).join('');
    return `<tr><td><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:${colors[key]};margin-right:6px;vertical-align:middle"></span>${cat.label}</td>${cells}</tr>`;
  }).join('');

  document.getElementById('peerTableArea').innerHTML = `<table class="peer-perf-tbl">
    <thead><tr><th>Basket (EV-weighted)</th><th>1M</th><th>YTD</th><th>1Y</th></tr></thead>
    <tbody>${perfRows}</tbody>
  </table>`;
}

function peerMiniHover(e, range) {
  const meta = window[`_peerMini_${range}`];
  if (!meta) return;
  const { dates, W, H, PAD, PADR, PADT, PADB, baskets, basketData, colors } = meta;
  const wrap = document.getElementById(`peerWrap_${range}`);
  const rect = wrap.getBoundingClientRect();
  const mouseX = ((e.clientX - rect.left) / rect.width) * W;
  const clampedX = Math.max(PAD, Math.min(W - PADR, mouseX));
  const idx = Math.round(((clampedX - PAD) / (W - PAD - PADR)) * (dates.length - 1));
  const safeIdx = Math.max(0, Math.min(dates.length - 1, idx));
  const d = dates[safeIdx];

  const cross = document.getElementById(`peerCross_${range}`);
  if (cross) {
    const x = PAD + (safeIdx / (dates.length - 1)) * (W - PAD - PADR);
    cross.setAttribute('x1', x); cross.setAttribute('x2', x); cross.setAttribute('opacity', '0.6');
  }

  const dateStr = new Date(d + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  let rows = `<div style="font-family:var(--font-mono);font-size:9px;color:var(--muted);margin-bottom:3px">${dateStr}</div>`;
  baskets.forEach(key => {
    const pts = basketData[key];
    if (!pts) return;
    let val = null;
    for (let i = pts.length - 1; i >= 0; i--) {
      if (pts[i].d <= d) { val = pts[i].v; break; }
    }
    if (val == null && pts.length > 0) val = pts[0].v;
    if (val != null) {
      const ret = (val - 100).toFixed(1);
      const sign = parseFloat(ret) >= 0 ? '+' : '';
      const c = parseFloat(ret) >= 0 ? 'var(--green)' : 'var(--red)';
      rows += `<div style="display:flex;justify-content:space-between;gap:10px;padding:1px 0;font-family:var(--font-mono);font-size:9px">
        <span style="color:${colors[key]}">${CATS[key].label.split(' ')[0]}</span>
        <span style="color:${c};font-weight:500">${sign}${ret}%</span>
      </div>`;
    }
  });

  const tt = document.getElementById(`peerTT_${range}`);
  const ttBox = document.getElementById(`peerTT_${range}_box`);
  if (tt && ttBox) {
    ttBox.innerHTML = rows;
    tt.style.display = 'block';
    const pxX = (clampedX / W) * rect.width;
    const ttW = 150;
    tt.style.left = (pxX + ttW + 10 > rect.width ? pxX - ttW - 4 : pxX + 8) + 'px';
    tt.style.top = '10px';
  }
}

function peerMiniLeave(range) {
  const tt = document.getElementById(`peerTT_${range}`);
  if (tt) tt.style.display = 'none';
  const cross = document.getElementById(`peerCross_${range}`);
  if (cross) cross.setAttribute('opacity', '0');
}

function togglePeerBasket(key) {
  peerHidden[key] = !peerHidden[key];
  drawPeerChart();
}

function rPeers(t) {
  const lv = live[t] || {};
  const catKey = TICKER_CAT[t];
  const cat = CATS[catKey];
  if (!lv || lv.error) return '';

  // Individual ticker indexed returns
  const ranges = [
    { label: '1M', from: daysAgo(30) },
    { label: 'YTD', from: ytdStart() },
    { label: '1Y', from: oneYrAgo() },
  ];

  // Get EV for this ticker
  let ev = null;
  if (lv.mktCap) {
    const raw = lv.mktCap, num = parseFloat(raw);
    const mult = raw.includes('T') ? 1e12 : raw.includes('B') ? 1e9 : raw.includes('M') ? 1e6 : 1;
    ev = num * mult;
    const fin = finCache[t];
    if (fin) ev += (fin.totalDebt || 0) - (fin.cash || 0);
  }

  // Compute EV weight within its basket
  let evWeight = null;
  if (ev && cat) {
    let totalEV = 0;
    cat.tickers.forEach(ct => {
      const clv = live[ct];
      if (!clv || clv.error || !clv.mktCap) return;
      const raw = clv.mktCap, num = parseFloat(raw);
      const mult = raw.includes('T') ? 1e12 : raw.includes('B') ? 1e9 : raw.includes('M') ? 1e6 : 1;
      let cev = num * mult;
      const cf = finCache[ct];
      if (cf) cev += (cf.totalDebt || 0) - (cf.cash || 0);
      totalEV += cev;
    });
    if (totalEV > 0) evWeight = ev / totalEV;
  }

  const retCells = ranges.map(r => {
    let ret = null;
    if (lv.priceMap && lv.price) {
      const priceDates = Object.keys(lv.priceMap).sort();
      let basePrice = null;
      for (const d of priceDates) {
        if (d >= r.from) { basePrice = lv.priceMap[d]; break; }
      }
      if (basePrice) ret = ((lv.price - basePrice) / basePrice) * 100;
    }
    if (ret == null) {
      if (r.label === '1M') ret = lv.mo1Pct;
      else if (r.label === 'YTD') ret = lv.ytdPct;
      else if (r.label === '1Y') ret = lv.yr1Pct;
    }
    return ret;
  });

  // Basket returns for the same periods
  const basketRets = ranges.map(r => getBasketReturn(catKey, r.from));

  // Relative performance (ticker vs basket)
  const relPerf = retCells.map((ret, i) => {
    if (ret == null || basketRets[i] == null) return null;
    return ret - basketRets[i];
  });

  const colors = { industrials: '#4f8ef7', smr: '#3dd68c', fuel: '#f7c94f', etf: '#a78bfa' };

  return `
    <div class="shd">Peer basket · <span style="color:${colors[catKey]}">${cat.label}</span></div>
    <div class="kg">
      ${kv('EV', ev ? fmtCap(ev) : '<span class="na">N/A</span>')}
      ${kv('Basket weight', evWeight != null ? (evWeight * 100).toFixed(1) + '%' : '<span class="na">N/A</span>')}
    </div>
    <table class="ptbl" style="margin-top:8px">
      <thead><tr><th></th><th>1M</th><th>YTD</th><th>1Y</th></tr></thead>
      <tbody>
        <tr>
          <td>${t}</td>
          ${retCells.map(r => `<td>${r != null ? ps(r) : '<span class="na">N/A</span>'}</td>`).join('')}
        </tr>
        <tr>
          <td style="color:${colors[catKey]}">${cat.label.split(' ')[0]} basket</td>
          ${basketRets.map(r => `<td>${r != null ? ps(r) : '<span class="na">N/A</span>'}</td>`).join('')}
        </tr>
        <tr>
          <td>Relative</td>
          ${relPerf.map(r => `<td>${r != null ? ps(r) : '<span class="na">N/A</span>'}</td>`).join('')}
        </tr>
      </tbody>
    </table>
    <div style="font-family:var(--font-mono);font-size:9px;color:var(--muted);margin-top:8px">
      Basket peers: ${cat.tickers.join(', ')} · EV-weighted indexed returns
    </div>`;
}

function renderCard(t){
  const lv=live[t],en=EN[t];
  let ph,ch;
  if(!lv){
    ph=`<div class="sk" style="width:75px;height:15px"></div>`;
    ch=`<div class="sk" style="width:55px;height:11px;margin-top:4px"></div>`;
  }else if(lv.error){
    ph=`<div style="font-family:var(--font-mono);font-size:10px;color:var(--red)">error</div>`;
    ch=`<div style="font-family:var(--font-mono);font-size:9px;color:var(--muted);max-width:140px;line-height:1.4">${lv.msg.slice(0,80)}</div>`;
  }else{
    const c=lv.changePct>=0?'pos':'neg';
    ph=`<div class="prc">$${lv.price.toFixed(2)}</div>`;
    ch=`<div class="chg ${c}">${lv.changePct>=0?'+':''}${lv.changePct.toFixed(2)}% today</div>`;
  }
  const body=!lv
    ?`<div style="display:flex;flex-direction:column;gap:6px">${[95,80,90,70,85].map(w=>`<div class="sk" style="height:10px;width:${w}%"></div>`).join('')}</div>`
    :activeTab==='overview'?rOverview(t):activeTab==='valuation'?rValuation(t):activeTab==='financials'?rFinancials(t):activeTab==='coverage'?rCoverage(t):activeTab==='filings'?rFilings(t):activeTab==='ownership'?rOwnership(t):activeTab==='peers'?rPeers(t):rNews(t);
  return`<div class="card"><div class="ch"><div><div class="tkr">${t}</div><div class="cn">${NAMES[t]}</div></div><div class="pb">${ph}${ch}</div></div>${body}</div>`;
}

function sortedT(){
  return[...TICKERS].sort((a,b)=>{
    const la=live[a]||{},lb=live[b]||{},ea=EN[a],eb=EN[b];
    if(sortKey==='ticker')return a.localeCompare(b);
    if(sortKey==='price')return(lb.price||0)-(la.price||0);
    if(sortKey==='change')return(lb.changePct||0)-(la.changePct||0);
    if(sortKey==='ytd')return(lb.ytdPct||0)-(la.ytdPct||0);
    if(sortKey==='1y')return(lb.yr1Pct||0)-(la.yr1Pct||0);
    if(sortKey==='upside'){
      const ua=ea.pt_consensus&&la.price?(ea.pt_consensus-la.price)/la.price:-99;
      const ub=eb.pt_consensus&&lb.price?(eb.pt_consensus-lb.price)/lb.price:-99;
      return ub-ua;
    }
    if(sortKey==='dcf'){
      const ua=ea.dcf_base&&la.price?(ea.dcf_base-la.price)/la.price:-99;
      const ub=eb.dcf_base&&lb.price?(eb.dcf_base-lb.price)/lb.price:-99;
      return ub-ua;
    }
    return 0;
  });
}

function renderGrid(){
  const grid = document.getElementById('grid');
  // Wider cards for financials/filings/ownership tabs
  grid.className = ['financials','filings','ownership'].includes(activeTab) ? 'grid wide' : 'grid';

  if (activeCat !== 'all') {
    // Single category — no section headers, just sort within category
    const catTickers = CATS[activeCat].tickers;
    const sorted = sortedT().filter(t => catTickers.includes(t));
    grid.innerHTML = sorted.map(renderCard).join('');
    return;
  }

  // All — render each category as a group with a colored section header
  let html = '';
  Object.entries(CATS).forEach(([key, cat]) => {
    const sorted = sortedT().filter(t => cat.tickers.includes(t));
    if (!sorted.length) return;
    html += `<div class="cat-hdr" style="color:${cat.color};border-color:${cat.color}20">
      <span style="background:${cat.color}18;padding:3px 10px;border-radius:2px;border:1px solid ${cat.color}30">${cat.label}</span>
    </div>`;
    html += sorted.map(renderCard).join('');
  });
  grid.innerHTML = html;
}

function setCat(cat, btn) {
  activeCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => {
    b.classList.remove('active');
    b.style.background = 'transparent';
    b.style.borderColor = '';
    b.style.color = '';
  });
  btn.classList.add('active');
  // Color each category button distinctly
  const colors = { all:'#4f8ef7', industrials:'#4f8ef7', smr:'#3dd68c', fuel:'#f7c94f', etf:'#a78bfa' };
  btn.style.background = colors[cat] || '#4f8ef7';
  btn.style.borderColor = colors[cat] || '#4f8ef7';
  btn.style.color = '#fff';
  renderGrid();
}
function setTab(tab,el){
  activeTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  // Show/hide peer panel
  const pp = document.getElementById('peerPanel');
  if (tab === 'peers') {
    pp.classList.add('show');
    drawPeerChart();
  } else {
    pp.classList.remove('show');
  }
  if (tab==='financials') {
    TICKERS.forEach(t => {
      if (live[t] && !live[t].error && !finCache[t]) {
        fetchFinancials(t).then(()=>renderGrid()).catch(()=>{});
      }
    });
  }
  if (tab==='filings') {
    // Also trigger financials load since filings tab shows no financial data itself
    TICKERS.forEach(t => {
      if (live[t] && !live[t].error && !finCache[t]) {
        fetchFinancials(t).then(()=>{}).catch(()=>{});
      }
    });
  }
  if (tab==='coverage') {
    TICKERS.forEach(t => {
      if (live[t] && !live[t].error && !analystCache[t]) {
        fetchAnalystCoverage(t).then(()=>renderGrid()).catch(()=>{});
      }
    });
  }
  renderGrid();
}
function setSort(el,key){ document.querySelectorAll('.sb').forEach(b=>b.classList.remove('active')); el.classList.add('active'); sortKey=key; renderGrid(); }

loadAll();
